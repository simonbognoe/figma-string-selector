<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 12px;
    color: #1a1a1a;
    background: #fff;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* Selection status bar */
  #status {
    padding: 8px 12px;
    font-size: 11px;
    border-bottom: 1px solid #e5e5e5;
    display: flex;
    align-items: center;
    gap: 6px;
    min-height: 32px;
    flex-shrink: 0;
  }
  #status .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  #status.has-selection .dot { background: #18a058; }
  #status.no-selection .dot { background: #e5e5e5; }
  #status.has-selection { color: #1a1a1a; }
  #status.no-selection { color: #999; }

  /* Controls */
  #controls {
    padding: 8px 12px;
    border-bottom: 1px solid #e5e5e5;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }

  .search-wrap {
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    color: #999;
    pointer-events: none;
  }
  #search {
    width: 100%;
    padding: 6px 8px 6px 28px;
    border: 1px solid #e5e5e5;
    border-radius: 6px;
    font-size: 12px;
    outline: none;
    background: #f9f9f9;
  }
  #search:focus {
    border-color: #0d99ff;
    background: #fff;
  }

  #collection-filter {
    padding: 5px 8px;
    border: 1px solid #e5e5e5;
    border-radius: 6px;
    font-size: 12px;
    background: #f9f9f9;
    outline: none;
    cursor: pointer;
    width: 100%;
  }
  #collection-filter:focus { border-color: #0d99ff; }

  /* Variable list */
  #list-wrap {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }

  #loading {
    padding: 24px;
    text-align: center;
    color: #999;
    font-size: 12px;
  }
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid #e5e5e5;
    border-top-color: #0d99ff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #empty {
    display: none;
    padding: 24px;
    text-align: center;
    color: #999;
  }

  .var-item {
    display: flex;
    align-items: center;
    padding: 7px 12px;
    border-bottom: 1px solid #f0f0f0;
    gap: 8px;
    cursor: pointer;
  }
  .var-item:hover { background: #f0f6ff; }
  .var-item.disabled { cursor: not-allowed; opacity: 0.5; }
  .var-item:last-child { border-bottom: none; }

  .var-text {
    flex: 1;
    min-width: 0;
  }
  .var-name {
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #1a1a1a;
  }
  .var-value {
    font-size: 11px;
    color: #666;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }
  .var-value.loading { color: #bbb; font-style: italic; }

  .var-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .collection-badge {
    font-size: 10px;
    padding: 2px 5px;
    border-radius: 3px;
    background: #f0f0f0;
    color: #666;
    white-space: nowrap;
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .apply-btn {
    width: 24px;
    height: 24px;
    border-radius: 4px;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    flex-shrink: 0;
  }
  .var-item:hover .apply-btn { background: #0d99ff; color: #fff; }
  .apply-btn.success { background: #18a058; color: #fff; }

  /* Footer */
  #footer {
    padding: 6px 12px;
    font-size: 11px;
    color: #999;
    border-top: 1px solid #e5e5e5;
    flex-shrink: 0;
  }

  /* Error toast */
  #error-toast {
    display: none;
    position: fixed;
    bottom: 32px;
    left: 12px;
    right: 12px;
    background: #ff4d4f;
    color: #fff;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 11px;
    z-index: 100;
  }
</style>
</head>
<body>

<div id="status" class="no-selection">
  <span class="dot"></span>
  <span id="status-text">No text layer selected</span>
</div>

<div id="controls">
  <div class="search-wrap">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
      <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.5"/>
      <line x1="11" y1="11" x2="14.5" y2="14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input id="search" type="text" placeholder="Search by name or value..." autocomplete="off" spellcheck="false">
  </div>
  <select id="collection-filter">
    <option value="">All collections</option>
  </select>
</div>

<div id="list-wrap">
  <div id="loading"><span class="spinner"></span>Loading variables…</div>
  <div id="empty">No variables found</div>
  <div id="list"></div>
</div>

<div id="footer"></div>
<div id="error-toast"></div>

<!-- INJECT_SCRIPT -->
</body>
</html>
